<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas Portilho | Power BI Analyst</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            color: #1a2a3a;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Language Switcher */
        .lang-switch {
            text-align: right;
            margin-bottom: 2rem;
        }

        .lang-btn {
            background: transparent;
            border: 1px solid #cbd5e1;
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            cursor: pointer;
            margin-left: 0.5rem;
            color: #475569;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: #1e3a5f;
            border-color: #1e3a5f;
            color: white;
        }

        /* Header */
        header {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid #e2e8f0;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 0.25rem;
        }

        .title {
            font-size: 1.2rem;
            color: #1e3a5f;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .location {
            color: #64748b;
            font-size: 0.85rem;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }

        .card:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08);
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 3px solid #1e3a5f;
            display: inline-block;
        }

        /* Skills */
        .skills-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-top: 0.5rem;
        }

        .skill-tag {
            background: #eef2ff;
            color: #1e3a5f;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 500;
        }

        /* Experience */
        .exp-header {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 0.75rem;
        }

        .exp-title {
            font-weight: 700;
            color: #0f172a;
            font-size: 1.05rem;
        }

        .exp-period {
            color: #64748b;
            font-size: 0.8rem;
        }

        .exp-company {
            color: #1e3a5f;
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
        }

        .exp-desc {
            color: #334155;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .frigate-img {
            width: 100%;
            border-radius: 0.75rem;
            margin: 1rem 0;
            border: 1px solid #e2e8f0;
        }

        .img-caption {
            font-size: 0.7rem;
            color: #64748b;
            text-align: center;
            margin-top: 0.25rem;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }

        .metric-card {
            background: #f8fafc;
            padding: 0.8rem;
            border-radius: 0.75rem;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .metric-number {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1e3a5f;
        }

        .metric-label {
            font-size: 0.7rem;
            color: #64748b;
        }

        /* Dashboard Moderno */
        .dashboard-container {
            background: #0f172a;
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 0.5rem;
        }

        .dashboard-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 0.6rem 1.2rem;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 0.5rem;
            color: #94a3b8;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: #1e3a5f;
            color: white;
        }

        .tab-btn:hover:not(.active) {
            background: #334155;
            color: #e2e8f0;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Dashboard Widgets */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .kpi-card {
            background: #1e293b;
            padding: 1rem;
            border-radius: 0.75rem;
            text-align: center;
        }

        .kpi-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #60a5fa;
        }

        .kpi-label {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 0.25rem;
        }

        .progress-item {
            margin-bottom: 1rem;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-bottom: 0.25rem;
            color: #cbd5e1;
        }

        .progress-bar-bg {
            background: #334155;
            border-radius: 0.5rem;
            height: 0.5rem;
            overflow: hidden;
        }

        .progress-fill {
            background: #60a5fa;
            height: 100%;
            border-radius: 0.5rem;
            transition: width 0.5s ease;
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .schedule-card {
            background: #1e293b;
            padding: 0.8rem;
            border-radius: 0.75rem;
            text-align: center;
        }

        .schedule-date {
            font-size: 0.7rem;
            color: #94a3b8;
        }

        .schedule-status {
            font-size: 0.7rem;
            font-weight: 500;
            margin-top: 0.25rem;
        }

        .status-completed { color: #10b981; }
        .status-progress { color: #f59e0b; }
        .status-planned { color: #64748b; }

        .risk-item {
            background: #1e293b;
            padding: 0.6rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .risk-badge {
            background: #334155;
            padding: 0.2rem 0.5rem;
            border-radius: 1rem;
            font-size: 0.7rem;
            color: #cbd5e1;
        }

        .achievement-list {
            list-style: none;
            padding-left: 0;
        }

        .achievement-list li {
            margin-bottom: 0.6rem;
            padding-left: 1.2rem;
            position: relative;
            font-size: 0.9rem;
            color: #334155;
        }

        .achievement-list li::before {
            content: "▹";
            position: absolute;
            left: 0;
            color: #1e3a5f;
        }

        .contact-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .btn {
            padding: 0.5rem 1.2rem;
            border-radius: 0.5rem;
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: inline-block;
            cursor: pointer;
            border: none;
            text-decoration: none;
        }

        .btn-primary {
            background: #1e3a5f;
            color: white;
        }

        .btn-primary:hover {
            background: #0f2a4a;
            transform: translateY(-1px);
        }

        .btn-outline {
            border: 1px solid #cbd5e1;
            background: white;
            color: #1e3a5f;
        }

        .btn-outline:hover {
            border-color: #1e3a5f;
            background: #f8fafc;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
            color: #94a3b8;
            font-size: 0.75rem;
        }

        @media (max-width: 700px) {
            .container { padding: 1rem; }
            h1 { font-size: 1.6rem; }
            .kpi-grid { grid-template-columns: 1fr; gap: 0.75rem; }
            .schedule-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

        function initDashboard() {

                    contents.forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    const activeContent = document.getElementById(`tab-${tabId}`);
                    if (activeContent) activeContent.classList.add('active');
                });
            });
