        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            color: #1a2a3a;
            line-height: 1.5;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Language Switcher */
        .lang-switch {
            text-align: right;
            margin-bottom: 2rem;
        }

        .lang-btn {
            background: transparent;
            border: 1px solid #cbd5e1;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            cursor: pointer;
            margin-left: 0.5rem;
            color: #475569;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .lang-btn.active {
            background: #1e3a5f;
            border-color: #1e3a5f;
            color: white;
        }

        .flag-icon {
            font-size: 1.1rem;
        }

        /* Hero Section */
        .hero {
            display: flex;
            align-items: center;
            gap: 3rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
        }
        .profile-pic {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #1e3a5f;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            background: #e2e8f0;
        }
        .hero-content {
            flex: 1;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }
        .hero-tagline {
            font-size: 1.2rem;
            color: #1e3a5f;
            font-weight: 500;
            margin-bottom: 0.75rem;
        }
        .hero-description {
            color: #475569;
            margin-bottom: 1rem;
            font-size: 1rem;
        }
        .availability {
            display: inline-block;
            background: #10b981;
            color: white;
            padding: 0.25rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 500;
        }

        /* CTA Buttons */
        .cta-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }
        .btn {
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            cursor: pointer;
            border: none;
        }
        .btn-primary {
            background: #1e3a5f;
            color: white;
        }
        .btn-primary:hover {
            background: #0f2a4a;
            transform: translateY(-2px);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #cbd5e1;
            color: #1e3a5f;
        }
        .btn-outline:hover {
            border-color: #1e3a5f;
            background: #f8fafc;
            transform: translateY(-2px);
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 1.25rem;
            padding: 1.8rem;
            margin-bottom: 1.8rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .card:hover {
            box-shadow: 0 20px 25px -12px rgba(0,0,0,0.08);
        }
        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .card-title i {
            color: #1e3a5f;
            font-size: 1.4rem;
        }

        /* Skills com ícones oficiais */
        .skills-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 0.5rem;
        }
        .skill-card {
            background: #f8fafc;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .skill-card:hover {
            background: #eef2ff;
            transform: translateY(-2px);
        }
        .skill-icon {
            font-size: 1.1rem;
        }

        /* Experience */
        .exp-header {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }
        .exp-title {
            font-weight: 700;
            color: #0f172a;
            font-size: 1.1rem;
        }
        .exp-company {
            color: #1e3a5f;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        .frigate-img {
            width: 100%;
            border-radius: 1rem;
            margin: 1rem 0;
            border: 1px solid #e2e8f0;
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 1rem;
            margin: 1.2rem 0;
        }
        .metric-card {
            background: #f8fafc;
            padding: 0.8rem;
            border-radius: 0.75rem;
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        .metric-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e3a5f;
        }

        /* Dashboard Moderno */
        .dashboard-container {
            background: #0f172a;
            border-radius: 1rem;
            padding: 1.2rem;
            margin-top: 0.5rem;
        }
        .dashboard-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 0.5rem;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 0.5rem 1.2rem;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 0.5rem;
            color: #94a3b8;
            transition: all 0.2s;
        }
        .tab-btn.active, .tab-btn:hover {
            background: #1e3a5f;
            color: white;
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .kpi-card {
            background: #1e293b;
            padding: 1rem;
            border-radius: 0.75rem;
            text-align: center;
        }
        .kpi-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #60a5fa;
        }
        .progress-item { margin-bottom: 1rem; }
        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-bottom: 0.25rem;
            color: #cbd5e1;
        }
        .progress-bar-bg {
            background: #334155;
            border-radius: 0.5rem;
            height: 0.5rem;
            overflow: hidden;
        }
        .progress-fill {
            background: #60a5fa;
            height: 100%;
            border-radius: 0.5rem;
        }
        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        .schedule-card {
            background: #1e293b;
            padding: 0.8rem;
            border-radius: 0.75rem;
            text-align: center;
        }
        .risk-item {
            background: #1e293b;
            padding: 0.6rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .badge-risk {
            background: #334155;
            padding: 0.2rem 0.6rem;
            border-radius: 2rem;
            font-size: 0.7rem;
        }

        .achievement-list {
            list-style: none;
            padding-left: 0;
        }
        .achievement-list li {
            margin-bottom: 0.7rem;
            padding-left: 1.5rem;
            position: relative;
        }
        .achievement-list li::before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #10b981;
            font-weight: bold;
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e2e8f0;
            color: #94a3b8;
            font-size: 0.75rem;
        }

        @media (max-width: 700px) {
            .container { padding: 1rem; }
            .hero { flex-direction: column; text-align: center; padding: 1.5rem; }
            .cta-group { justify-content: center; }
            .kpi-grid, .schedule-grid { grid-template-columns: 1fr; }
            .card-title { font-size: 1.1rem; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
