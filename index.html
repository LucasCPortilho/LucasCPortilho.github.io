<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas Portilho | Project Analyst | Power BI | Defense</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            line-height: 1.5;
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .language-switch {
            text-align: right;
            margin-bottom: 1rem;
        }

        .lang-btn {
            background: #334155;
            color: #e2e8f0;
            padding: 0.3rem 0.8rem;
            border-radius: 1rem;
            text-decoration: none;
            font-size: 0.8rem;
            margin-left: 0.5rem;
            cursor: pointer;
            border: none;
        }

        .lang-btn.active {
            background: #60a5fa;
            color: #0f172a;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .badge {
            display: inline-block;
            background: #1e293b;
            padding: 0.2rem 0.8rem;
            border-radius: 1rem;
            font-size: 0.7rem;
            margin: 0.2rem;
            border: 1px solid #334155;
        }

        .tagline {
            font-size: 1rem;
            color: #94a3b8;
            margin-top: 0.5rem;
        }

        .section {
            background: #1e293b;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #334155;
            transition: transform 0.2s;
        }

        .section:hover {
            transform: translateY(-3px);
            border-color: #60a5fa;
        }

        h2 {
            color: #60a5fa;
            font-size: 1.3rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-left: 3px solid #c084fc;
            padding-left: 0.8rem;
        }

        .skills-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 0.5rem;
        }

        .skill-card {
            background: #0f172a;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            border: 1px solid #334155;
        }

        .project-highlight {
            background: linear-gradient(135deg, #1e1b4b, #0f172a);
            border-left: 4px solid #c084fc;
            padding: 1.2rem;
            border-radius: 0.8rem;
            margin-top: 1rem;
        }

        .frigate-img {
            width: 100%;
            border-radius: 0.8rem;
            margin: 1rem 0;
            border: 1px solid #334155;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 0.8rem;
            margin: 1rem 0;
        }

        .metric {
            background: #0f172a;
            padding: 0.8rem;
            border-radius: 0.8rem;
            text-align: center;
        }

        .metric-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: #c084fc;
        }

        .metric-label {
            font-size: 0.7rem;
            color: #94a3b8;
        }

        .btn {
            background: #60a5fa;
            color: #0f172a;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.2s;
            display: inline-block;
            cursor: pointer;
            border: none;
            font-size: 0.8rem;
        }

        .btn:hover {
            background: #c084fc;
            transform: scale(1.02);
        }

        .contact-links {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #334155;
            color: #64748b;
            font-size: 0.75rem;
        }

        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }
            h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="language-switch">
            <button class="lang-btn active" id="btnPT">🇧🇷 PT</button>
            <button class="lang-btn" id="btnEN">🇺🇸 EN</button>
        </div>

        <div id="content"></div>

        <footer id="footer">
            <p>🌍 Disponível para oportunidades internacionais remotas</p>
            <p>📍 Trabalhando para receber em Euros</p>
        </footer>
    </div>

    <script>
        const contentPT = {
            name: "Lucas Portilho",
            title: "Analista de Projetos | Power BI | Defesa",
            location: "📍 Brasil | 🌍 Disponível para trabalho remoto internacional",
            about: "Sobre mim",
            aboutText: "Analista de Projetos com experiência em projetos de alto nível no setor de defesa. Especialista em Power BI, cronogramas e gestão de projetos complexos. Atuei diretamente no programa de construção da Fragata MEKO A-200 para a Marinha do Brasil, gerenciando dashboards, indicadores de performance e integração de equipes multidisciplinares.",
            
            experience: "⚓ Experiência de Destaque",
            projectName: "Programa Fragata MEKO A-200 - Marinha do Brasil",
            projectDesc: "Atuação como Analista de Projetos no mais significativo programa de defesa naval do Brasil. Responsável pelo desenvolvimento e manutenção de dashboards em Power BI para acompanhamento de KPIs de produção, cronogramas e custos. Integração com equipes técnicas da TKMS (Alemanha) e fornecedores internacionais.",
            specs: "Especificações Técnicas da Fragata",
            
            tools: "🛠️ Ferramentas e Tecnologias",
            skillsDetails: ["Power BI (Dashboards, DAX, ETL)", "Microsoft Project (Cronogramas)", "Primavera P6 (Planejamento)", "Jira (Gestão de Tarefas)", "Excel Avançado (Power Query)", "Pacote Office 365", "Gestão de KPIs e OKRs", "Metodologias Ágeis (Scrum/Kanban)"],
            
            metricsTitle: "Métricas do Projeto",
            metrics: [
                { number: "121m", label: "Comprimento da Fragata" },
                { number: "3.950t", label: "Deslocamento" },
                { number: "29+ nós", label: "Velocidade Máxima" },
                { number: "125+", label: "Tripulação" }
            ],
            
            achievements: "🏆 Principais Realizações",
            achievementsList: [
                "Criação de dashboard executivo em Power BI com 15+ KPIs para diretoria do programa",
                "Redução de 30% no tempo de consolidação de relatórios semanais",
                "Treinamento de 20+ usuários no uso de dashboards interativos",
                "Integração de dados de 3 sistemas diferentes (Primavera, Jira, Excel)",
                "Participação em reuniões com stakeholders internacionais (Alemanha)"
            ],
            
            goal: "🎯 Objetivo Profissional",
            goalText: "Atuar como Analista de Projetos / Power BI Specialist remoto para empresas europeias, aplicando minha experiência em projetos complexos e gestão de dados para gerar valor e eficiência.",
            
            contact: "📫 Contato",
            emailBtn: "📧 Enviar E-mail",
            linkedinBtn: "💼 LinkedIn",
            githubBtn: "🐙 GitHub"
        };

        const contentEN = {
            name: "Lucas Portilho",
            title: "Project Analyst | Power BI | Defense Sector",
            location: "📍 Brazil | 🌍 Available for international remote work",
            about: "About Me",
            aboutText: "Project Analyst with experience in high-level defense sector projects. Power BI specialist focused on dashboards, schedules, and complex project management. Worked directly on the MEKO A-200 Frigate construction program for the Brazilian Navy, managing dashboards, performance indicators, and multidisciplinary team integration.",
            
            experience: "⚓ Featured Experience",
            projectName: "MEKO A-200 Frigate Program - Brazilian Navy",
            projectDesc: "Project Analyst role in Brazil's most significant naval defense program. Responsible for developing and maintaining Power BI dashboards to track production KPIs, schedules, and costs. Integration with TKMS (Germany) technical teams and international suppliers.",
            specs: "Frigate Technical Specifications",
            
            tools: "🛠️ Tools & Technologies",
            skillsDetails: ["Power BI (Dashboards, DAX, ETL)", "Microsoft Project (Schedules)", "Primavera P6 (Planning)", "Jira (Task Management)", "Advanced Excel (Power Query)", "Office 365 Suite", "KPI & OKR Management", "Agile Methodologies (Scrum/Kanban)"],
            
            metricsTitle: "Project Metrics",
            metrics: [
                { number: "121m", label: "Frigate Length" },
                { number: "3,950t", label: "Displacement" },
                { number: "29+ knots", label: "Max Speed" },
                { number: "125+", label: "Crew" }
            ],
            
            achievements: "🏆 Key Achievements",
            achievementsList: [
                "Created executive Power BI dashboard with 15+ KPIs for program directorate",
                "Reduced weekly report consolidation time by 30%",
                "Trained 20+ users on interactive dashboards",
                "Integrated data from 3 different systems (Primavera, Jira, Excel)",
                "Participated in meetings with international stakeholders (Germany)"
            ],
            
            goal: "🎯 Professional Goal",
            goalText: "Work as a remote Project Analyst / Power BI Specialist for European companies, applying my experience in complex projects and data management to generate value and efficiency.",
            
            contact: "📫 Contact",
            emailBtn: "📧 Send Email",
            linkedinBtn: "💼 LinkedIn",
            githubBtn: "🐙 GitHub"
        };

        let currentLang = 'pt';

        function renderContent() {
            const content = currentLang === 'pt' ? contentPT : contentEN;
            
            const html = `
                <header>
                    <h1>${content.name}</h1>
                    <div class="tagline">${content.title}</div>
                    <div class="tagline" style="font-size: 0.8rem;">${content.location}</div>
                </header>

                <div class="section">
                    <h2>📌 ${content.about}</h2>
                    <p>${content.aboutText}</p>
                </div>

                <div class="section">
                    <h2>${content.experience}</h2>
                    <div class="project-highlight">
                        <h3 style="color: #c084fc; margin-bottom: 0.5rem;">🚢 ${content.projectName}</h3>
                        <p style="font-size: 0.9rem; margin-bottom: 1rem;">${content.projectDesc}</p>
                        <h4 style="color: #60a5fa; font-size: 0.9rem; margin: 0.8rem 0 0.5rem;">${content.specs}</h4>
                        <div class="metrics">
                            ${content.metrics.map(m => `
                                <div class="metric">
                                    <div class="metric-number">${m.number}</div>
                                    <div class="metric-label">${m.label}</div>
                                </div>
                            `).join('')}
                        </div>
                        <div style="margin-top: 0.8rem;">
                            <span class="badge">⚓ Marinha do Brasil</span>
                            <span class="badge">🇩🇪 Cooperação TKMS</span>
                            <span class="badge">🏭 Construção Naval</span>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <h2>${content.tools}</h2>
                    <div class="skills-grid">
                        ${content.skillsDetails.map(skill => `<span class="skill-card">${skill}</span>`).join('')}
                    </div>
                </div>

                <div class="section">
                    <h2>${content.achievements}</h2>
                    <ul style="margin-left: 1.2rem; color: #cbd5e1;">
                        ${content.achievementsList.map(item => `<li style="margin-bottom: 0.5rem;">${item}</li>`).join('')}
                    </ul>
                </div>

                <div class="section">
                    <h2>${content.goal}</h2>
                    <p>${content.goalText}</p>
                </div>

                <div class="section">
                    <h2>${content.contact}</h2>
                    <div class="contact-links">
                        <a href="#" class="btn" id="emailBtn">${content.emailBtn}</a>
                        <a href="#" class="btn" id="linkedinBtn">${content.linkedinBtn}</a>
                        <a href="#" class="btn" id="githubBtn">${content.githubBtn}</a>
                    </div>
                </div>
            `;
            
            document.getElementById('content').innerHTML = html;
            
            document.getElementById('footer').innerHTML = `
                <p>🌍 ${currentLang === 'pt' ? 'Disponível para oportunidades internacionais remotas' : 'Available for international remote opportunities'}</p>
                <p>📍 ${currentLang === 'pt' ? 'Trabalhando para receber em Euros' : 'Working to earn in Euros'}</p>
            `;

            document.getElementById('emailBtn').addEventListener('click', (e) => {
                e.preventDefault();
                window.location.href = 'mailto:lucascoxev2@outlook.com?subject=' + encodeURIComponent(currentLang === 'pt' ? 'Vi seu portfólio - Oportunidade para Analista de Projetos' : 'I saw your portfolio - Project Analyst Opportunity');
            });

            document.getElementById('linkedinBtn').addEventListener('click', (e) => {
                e.preventDefault();
                window.open('https://www.linkedin.com/in/lucas-portilho/', '_blank');
            });

            document.getElementById('githubBtn').addEventListener('click', (e) => {
                e.preventDefault();
                window.open('https://github.com/LucasCPortilho', '_blank');
            });
        }

        document.getElementById('btnPT').onclick = () => {
            currentLang = 'pt';
            document.getElementById('btnPT').classList.add('active');
            document.getElementById('btnEN').classList.remove('active');
            renderContent();
        };

        document.getElementById('btnEN').onclick = () => {
            currentLang = 'en';
            document.getElementById('btnEN').classList.add('active');
            document.getElementById('btnPT').classList.remove('active');
            renderContent();
        };

        renderContent();
    </script>
</body>
</html>
